<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Demande</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .nav { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav a { text-decoration: none; color: #333; padding: 10px 20px; border-radius: 5px; }
        .nav a:hover { background: #2196F3; color: white; }
        .form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        button { background: #2196F3; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #1976D2; }
        .message { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .success { background: #4CAF50; color: white; }
        .error { background: #f44336; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Nouvelle Demande de Congé</h1>

    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/demandes">Demandes</a>
        <a href="/nouvelle-demande">Nouvelle Demande</a>
        <a href="/statistiques">Statistiques</a>
    </div>

    <div class="form">
        <div th:if="${message}" class="message" th:classappend="${success} ? 'success' : 'error'" th:text="${message}"></div>

        <form method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Employé *</label>
                    <select name="employeId" required>
                        <option value="">Sélectionner un employé</option>
                        <option th:each="e : ${employes}" th:value="${e.id}" th:text="${e.nom + ' - ' + e.departement}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Type de Congé *</label>
                    <select name="typeCongeId" required>
                        <option value="">Sélectionner un type</option>
                        <option th:each="t : ${typesConges}" th:value="${t.id}" th:text="${t.libelle + ' (Quota: ' + t.quotaAnnuel + ' jours)'}"></option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date Début *</label>
                    <input type="date" name="dateDebut" required>
                </div>

                <div class="form-group">
                    <label>Date Fin *</label>
                    <input type="date" name="dateFin" required>
                </div>
            </div>

            <div class="form-group">
                <label>Motif</label>
                <textarea name="motif" rows="3" placeholder="Raison du congé..."></textarea>
            </div>

            <button type="submit">📨 Soumettre la demande</button>
        </form>
    </div>
</div>
</body>
</html>
