<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RH Congés - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; margin-bottom: 20px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #2196F3; }
        .nav { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; justify-content: center; }
        .nav a { text-decoration: none; color: #333; padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        .nav a:hover { background: #2196F3; color: white; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #2196F3; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-valider { background: #4CAF50; color: white; }
        .btn-rejeter { background: #f44336; color: white; }
        .btn-add { background: #2196F3; color: white; padding: 10px 20px; margin-bottom: 20px; }
        .status-en-attente { background: #ff9800; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .status-accepte { background: #4CAF50; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .status-refuse { background: #f44336; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { width: auto; }
    </style>
</head>
<body>

<!-- Barre de navigation personnalisée -->
<div style="background: linear-gradient(135deg, #1a2a3a, #0f1a24); padding: 12px 20px; margin-bottom: 30px; border-radius: 50px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <a href="/" style="color: #ecf0f1; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
        🏠 Accueil
    </a>
    <a href="/employes" style="color: #ecf0f1; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
        👥 Employés
    </a>
    <a href="/types-conge" style="color: #ecf0f1; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
        🏷️ Types
    </a>
    <a href="/demandes" style="color: #ecf0f1; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
        📋 Demandes
    </a>
    <a href="/statistiques" style="color: #ecf0f1; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
        📊 Statistiques
    </a>
</div>

<style>
    /* Effet au survol */
    div[style*="background: linear-gradient"] a:hover {
        background: #3498db;
        color: white !important;
        transform: translateY(-2px);
    }
</style>

<div class="container">
    <h1>📊 Gestion des Congés RH</h1>

    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/demandes">Demandes</a>
        <a href="/nouvelle-demande">Nouvelle Demande</a>
        <a href="/statistiques">Statistiques</a>
    </div>

    <!-- Statistiques -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Demandes</h3>
            <div class="number" th:text="${totalDemandes}">0</div>
        </div>
        <div class="stat-card">
            <h3>Acceptées</h3>
            <div class="number" style="color:#4CAF50" th:text="${demandesAcceptees}">0</div>
        </div>
        <div class="stat-card">
            <h3>Refusées</h3>
            <div class="number" style="color:#f44336" th:text="${demandesRefusees}">0</div>
        </div>
        <div class="stat-card">
            <h3>Taux Acceptation</h3>
            <div class="number" th:text="${tauxAcceptation}">0%</div>
        </div>
    </div>

    <!-- Dernières demandes -->
    <h2>📋 Dernières Demandes</h2>
    <table>
        <thead>
        <tr><th>Employé</th><th>Département</th><th>Type</th><th>Début</th><th>Fin</th><th>Jours</th><th>Statut</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="d : ${dernieresDemandes}">
            <td th:text="${d.employeNom}">-</td>
            <td th:text="${d.employeDepartement}">-</td>
            <td th:text="${d.typeCongeLibelle}">-</td>
            <td th:text="${d.dateDebut}">-</td>
            <td th:text="${d.dateFin}">-</td>
            <td th:text="${d.nombreJours}">-</td>
            <td><span th:class="'status-'+${d.statut.toLowerCase()}" th:text="${d.statut}">-</span></td>
            <td>
                <a th:href="'/valider/'+${d.id}" class="btn btn-valider" th:if="${d.statut == 'EN_ATTENTE'}">✓</a>
                <a th:href="'/rejeter/'+${d.id}" class="btn btn-rejeter" th:if="${d.statut == 'EN_ATTENTE'}">✗</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
