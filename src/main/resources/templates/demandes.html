<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Demandes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .nav { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav a { text-decoration: none; color: #333; padding: 10px 20px; border-radius: 5px; }
        .nav a:hover { background: #2196F3; color: white; }
        .filter-bar { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 12px; margin-bottom: 5px; color: #666; }
        .filter-group select, .filter-group input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-filter { background: #2196F3; color: white; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #2196F3; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-valider { background: #4CAF50; color: white; }
        .btn-rejeter { background: #f44336; color: white; }
        .status-en-attente { background: #ff9800; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .status-accepte { background: #4CAF50; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .status-refuse { background: #f44336; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Gestion des Demandes de Congés</h1>

    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/demandes">Demandes</a>
        <a href="/nouvelle-demande">Nouvelle Demande</a>
        <a href="/statistiques">Statistiques</a>
    </div>

    <!-- Filtres -->
    <div class="filter-bar">
        <div class="filter-group">
            <label>Statut</label>
            <select id="statut" onchange="window.location.href='/demandes?statut='+this.value">
                <option value="">Tous</option>
                <option value="EN_ATTENTE">En attente</option>
                <option value="ACCEPTE">Accepté</option>
                <option value="REFUSE">Refusé</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Département</label>
            <select id="departement" onchange="window.location.href='/demandes?departement='+this.value">
                <option value="">Tous</option>
                <option value="Informatique">Informatique</option>
                <option value="Ressources Humaines">RH</option>
                <option value="Comptabilité">Comptabilité</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Type Congé</label>
            <select id="typeConge" onchange="window.location.href='/demandes?typeConge='+this.value">
                <option value="">Tous</option>
                <option th:each="t : ${typesConges}" th:value="${t.id}" th:text="${t.libelle}"></option>
            </select>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Employé</th>
            <th>Département</th>
            <th>Type</th>
            <th>Date Début</th>
            <th>Date Fin</th>
            <th>Jours</th>
            <th>Motif</th>
            <th>Statut</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${demandes}">
            <td th:text="${d.id}">-</td>
            <td th:text="${d.employeNom}">-</td>
            <td th:text="${d.employeDepartement}">-</td>
            <td th:text="${d.typeCongeLibelle}">-</td>
            <td th:text="${d.dateDebut}">-</td>
            <td th:text="${d.dateFin}">-</td>
            <td th:text="${d.nombreJours}">-</td>
            <td th:text="${d.motif} ?: '-'">-</td>
            <td>
                <span th:class="'badge badge-' + ${d.statut.toLowerCase()}" th:text="${d.statut}"></span>
            </td>
            <td style="display: flex; gap: 8px; flex-wrap: wrap;">
                <a th:href="'/valider/' + ${d.id}" class="btn-valider" th:if="${d.statut == 'EN_ATTENTE'}"
                   style="background: #28a745; color: white; padding: 5px 12px; border-radius: 5px; text-decoration: none; display: inline-block;">✓ Valider</a>
                <a th:href="'/rejeter/' + ${d.id}" class="btn-rejeter" th:if="${d.statut == 'EN_ATTENTE'}"
                   style="background: #dc3545; color: white; padding: 5px 12px; border-radius: 5px; text-decoration: none; display: inline-block;">✗ Rejeter</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
