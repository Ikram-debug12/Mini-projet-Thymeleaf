<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Type</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .nav a { color: white; margin: 0 10px; text-decoration: none; }
    </style>
</head>
<body>
<div style="background: #2c3e50; padding: 15px; text-align: center;">
    <a href="/">Accueil</a> <a href="/types-conge">Retour</a>
</div>
<div class="container">
    <h2 th:text="${typeConge.id} ? '✏️ Modifier' : '➕ Ajouter'">Formulaire</h2>
    <form th:action="${typeConge.id} ? '/types-conge/modifier' : '/types-conge/ajouter'" method="post">
        <input type="hidden" name="id" th:value="${typeConge.id}">
        <input type="text" name="libelle" th:value="${typeConge.libelle}" placeholder="Libellé" required>
        <input type="number" name="quotaAnnuel" th:value="${typeConge.quotaAnnuel}" placeholder="Quota annuel" required>
        <button type="submit">Enregistrer</button>
    </form>
</div>
</body>
</html>
