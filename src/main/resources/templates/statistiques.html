<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistiques RH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .navbar {
            background: #1a2a3a;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
        }
        .navbar a:hover { background: #3498db; }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .chart-card h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
        }

        /* Barres */
        .bar-item { margin-bottom: 20px; }
        .bar-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 500; }
        .bar-container { background: #ecf0f1; border-radius: 10px; height: 35px; overflow: hidden; }
        .bar-fill {
            background: linear-gradient(90deg, #3498db, #2980b9);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-weight: bold;
            border-radius: 10px;
        }

        /* Camembert */
        .pie-container { display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        .pie-chart {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .pie-legend { display: flex; justify-content: center; gap: 30px; }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-color { width: 20px; height: 20px; border-radius: 4px; }
        .legend-color.accepte { background: #10b981; }
        .legend-color.refuse { background: #ef4444; }

        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <a href="/">Accueil</a>
        <a href="/employes">Employés</a>
        <a href="/types-conge">Types</a>
        <a href="/demandes">Demandes</a>
        <a href="/statistiques">Statistiques</a>
    </div>

    <h1>📊 Statistiques RH</h1>

    <div class="charts-container">
        <!-- Graphique 1 : Barres -->
        <div class="chart-card">
            <h2>📊 Jours consommés par département</h2>
            <div th:each="entry : ${joursParDepartement}">
                <div class="bar-item">
                    <div class="bar-label">
                        <span th:text="${entry.key}">-</span>
                        <span th:text="${entry.value} + ' jours'">-</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" th:style="'width: ' + (${entry.value} / ${maxJours} * 100) + '%; min-width: 35px;'" th:text="${entry.value} + 'j'"></div>
                    </div>
                </div>
            </div>
            <div th:if="${#maps.isEmpty(joursParDepartement)}" style="text-align:center; padding:40px;">
                Aucune donnée
            </div>
        </div>

        <!-- Graphique 2 : Camembert -->
        <div class="chart-card">
            <h2>🥧 Taux d'acceptation</h2>
            <div class="pie-container">
                <div class="pie-chart" th:style="'background: conic-gradient(#10b981 0% ' + ${pourcentageAccept} + '%, #ef4444 ' + ${pourcentageAccept} + '% 100%);'"></div>
                <div class="pie-legend">
                    <div class="legend-item">
                        <div class="legend-color accepte"></div>
                        <span>Accepté <strong th:text="${pourcentageAccept} + '%'">0%</strong></span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color refuse"></div>
                        <span>Refusé <strong th:text="${pourcentageRefuse} + '%'">0%</strong></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
